{{- if not .Values.secrets.useExisting -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dynamoprototype.secretName" . }}
  labels:
    {{- include "dynamoprototype.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ required "secrets.data.OPENAI_API_KEY is required when useExisting=false" .Values.secrets.data.OPENAI_API_KEY | quote }}
  SUPABASE_SERVICE_ROLE_KEY: {{ required "secrets.data.SUPABASE_SERVICE_ROLE_KEY is required when useExisting=false" .Values.secrets.data.SUPABASE_SERVICE_ROLE_KEY | quote }}
  {{- with .Values.secrets.data.SUPABASE_MCP_TOKEN }}
  SUPABASE_MCP_TOKEN: {{ . | quote }}
  {{- end }}
  {{- if .Values.agentApi.bearerAuth.enabled }}
  AGENT_API_BEARER: {{ required "secrets.data.AGENT_API_BEARER is required when agentApi.bearerAuth.enabled=true" .Values.secrets.data.AGENT_API_BEARER | quote }}
  {{- end }}
{{- end }}
