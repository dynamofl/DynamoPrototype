apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dynamoprototype.configMapName" . }}
  labels:
    {{- include "dynamoprototype.labels" . | nindent 4 }}
data:
  # Consumed by agent-api/main.py
  CORS_ALLOW_ORIGINS: {{ .Values.agentApi.corsAllowOrigins | quote }}
  ROOT_PATH: {{ .Values.agentApi.rootPath | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  {{- with .Values.config.supabaseMcpServerUrl }}
  SUPABASE_MCP_SERVER_URL: {{ . | quote }}
  {{- end }}
